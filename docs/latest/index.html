    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const passwordKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
        passwordKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function resizeReportFrame(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc) return;
        const body = doc.body;
        const html = doc.documentElement;
        const height = Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          html ? html.clientHeight : 0,
          html ? html.scrollHeight : 0,
          html ? html.offsetHeight : 0,
          window.innerHeight * 0.78
        );
        iframe.style.height = `${height + 40}px`;
      } catch (error) {
        iframe.style.height = "90vh";
      }
    }

    function renderReport(html) {
      const report = document.getElementById("report");
      if ("srcdoc" in document.createElement("iframe")) {
        const iframe = document.createElement("iframe");
        iframe.setAttribute("sandbox", "allow-same-origin");
        iframe.setAttribute("scrolling", "no");
        iframe.srcdoc = html;
        iframe.addEventListener("load", () => {
          resizeReportFrame(iframe);
          setTimeout(() => resizeReportFrame(iframe), 250);
          setTimeout(() => resizeReportFrame(iframe), 1000);
        });
        window.addEventListener("resize", () => resizeReportFrame(iframe), { passive: true });
        report.innerHTML = "";
        report.appendChild(iframe);
      } else {
        report.innerHTML = `<div class="fallback-report">${html}</div>`;
      }
    }

    async function unlockReport() {
      const button = document.getElementById("unlock");
      const password = document.getElementById("password").value;
      const status = document.getElementById("status");
      status.className = "small";
      document.getElementById("report").innerHTML = "";

      if (!password) {
        status.textContent = "Enter the report password first.";
        status.className = "error";
        return;
      }

      button.disabled = true;
      status.textContent = "Decrypting locally...";

      try {
        const key = await deriveKey(password, b64ToBytes(encryptedPayload.salt), encryptedPayload.iterations);
        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(encryptedPayload.iv) },
          key,
          b64ToBytes(encryptedPayload.ciphertext)
        );
        const html = new TextDecoder().decode(decrypted);
        renderReport(html);
        status.textContent = "Unlocked. Decryption succeeded locally in this browser.";
        status.className = "success";
      } catch (error) {
        status.textContent = "Could not decrypt. The password is wrong or the encrypted payload was changed.";
        status.className = "error";
      } finally {
        button.disabled = false;
      }
    }

    document.getElementById("unlock").addEventListener("click", unlockReport);
    document.getElementById("password").addEventListener("keydown", event => {
      if (event.key === "Enter") unlockReport();
    });
